apis:
  - aid: priceops:priceops-api
    name: PriceOps API
    description: REST API for managing customer information and usage records within
      the PriceOps pricing infrastructure platform. Supports retrieval of subscribed
      customers and their active plans, posting usage records for metered billing,
      and integrating pricing pages into SaaS applications.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
